// שבוע מתחיל ביום ראשון בישראל
function getDaysOfWeek(base) {
  const d = new Date(base);
  const day = d.getDay(); // 0=ראשון
  const sun = new Date(d);
  sun.setDate(d.getDate() - day);
  // נציג ב-ש (ב=1 ... ש=6)
  return Array.from({length:6},(_,i)=>{ const dd=new Date(sun); dd.setDate(sun.getDate()+i+1); return dd.toISOString().split("T")[0]; });
}
function fmt(str){ if(!str) return ""; const [y,m,d]=str.split("-"); return `${d}/${m}/${y}`; }
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);

}

.toast{position:fixed;bottom:1.5rem;left:1.5rem;background:#2d2020;color:#fff;border-radius:12px;padding:12px 20px;font-size:.88rem;z-index:999;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:slideup .3s ease;}
@keyframes slideup{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.settings-tabs{display:flex;gap:6px;margin-bottom:2rem;flex-wrap:wrap;}
.stab{padding:8px 16px;border-radius:20px;border:2px solid ${cfg.accentLight};font-size:.84rem;cursor:pointer;background:#fff;color:#9a8585;font-family:'Heebo',sans-serif;font-weight:600;transition:all .2s;}
.stab:hover{border-color:${cfg.accentColor};color:${cfg.accentColor};}
.stab.active{background:${cfg.accentColor};border-color:${cfg.accentColor};color:#fff;}
.settings-section{background:#fff;border-radius:16px;padding:1.8rem;box-shadow:0 4px 24px rgba(${rgb},.10);margin-bottom:1.5rem;}
.settings-section h4{font-size:1rem;color:#2d2020;margin-bottom:1.2rem;font-weight:700;}
.color-row{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-direction:row-reverse;}
.color-swatch{width:40px;height:40px;border-radius:10px;border:2px solid ${cfg.accentLight};cursor:pointer;overflow:hidden;flex-shrink:0;}
.color-swatch input[type=color]{width:100%;height:100%;border:none;cursor:pointer;padding:0;background:none;}
.color-presets{display:flex;gap:8px;flex-wrap:wrap;}
.color-preset{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0;}
.color-preset:hover,.color-preset.sel{border-color:#2d2020;transform:scale(1.15);}
.svc-editor-row{display:grid;grid-template-columns:2.5rem 1fr 1fr 80px 80px 50px 30px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid ${cfg.accentLight};direction:rtl;}
.svc-editor-row:last-child{border-bottom:none;}
.svc-editor-header{font-size:.7rem;color:#9a8585;font-weight:700;}
.mini-input{border:1.5px solid ${cfg.accentLight};border-radius:8px;padding:7px 10px;font-size:.85rem;font-family:'Heebo',sans-serif;color:#2d2020;background:#fff;outline:none;width:100%;transition:border-color .2s;direction:rtl;text-align:right;}
.mini-input:focus{border-color:${cfg.accentColor};}
.toggle{position:relative;width:38px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:22px;transition:.3s;cursor:pointer;}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked + .toggle-slider{background:${cfg.accentColor};}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px);}
.del-btn{background:#fdecea;color:#b92b27;border:none;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-btn:hover{background:#f8d7da;}
.add-svc-btn{background:${cfg.accentLight};color:${cfg.accentColor};border:2px dashed ${cfg.accentColor};border-radius:10px;padding:10px;font-size:.85rem;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:600;width:100%;margin-top:.8rem;transition:background .2s;}
.add-svc-btn:hover{filter:brightness(.97);}
`;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView]         = useState("booking");
  const [rdvList, setRdvList]   = useState(INITIAL_RDV);
  const [services, setServices] = useState(DEFAULT_SERVICES);
  const [config, setConfig]     = useState(DEFAULT_CONFIG);
  const [toast, setToast]       = useState(null);
  const styleRef = useRef(null);

  useEffect(()=>{
    if(!styleRef.current){ styleRef.current=document.createElement("style"); document.head.appendChild(styleRef.current); }
    styleRef.current.textContent = buildCss(config);
  },[config]);

  function showToast(msg){ setToast(msg); setTimeout(()=>setToast(null),3000); }

  return (
    <div>
      <nav className="nav">
        <div className="nav-brand">
          <span style={{fontSize:"1.5rem"}}>🌸</span>
          <span className="nav-logo">{config.salonName}</span>
        </div>
        <div className="nav-tabs">
          <button className={`nav-tab ${view==="booking"?"active":""}`} onClick={()=>setView("booking")}>הזמנת תור</button>
          <button className={`nav-tab ${view==="admin"?"active":""}`} onClick={()=>setView("admin")}>ניהול</button>
        </div>
      </nav>
      {view==="booking"
        ? <BookingFlow rdvList={rdvList} setRdvList={setRdvList} services={services} config={config} showToast={showToast}/>
        : <AdminPanel  rdvList={rdvList} setRdvList={setRdvList} services={services} setServices={setServices} config={config} setConfig={setConfig} showToast={showToast}/>
      }
      {toast && <div className="toast">✅ {toast}</div>}
    </div>
  );
}

// ─── הזמנת תור ────────────────────────────────────────────────────────────────
function BookingFlow({ rdvList, setRdvList, services, config, showToast }) {
  const [step, setStep]       = useState(1);
  const [service, setService] = useState(null);
  const [selDate, setSelDate] = useState("");
  const [selHour, setSelHour] = useState("");
  const [form, setForm]       = useState({nom:"",tel:"",note:""});
  const [wo, setWo]           = useState(0);

  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(today); base.setDate(today.getDate()+wo*7);
  const week = getDaysOfWeek(base);
  const taken = rdvList.filter(r=>r.date===selDate&&r.status!=="cancelled").map(r=>r.heure);
  const activeServices = services.filter(s=>s.active);
  const svcObj = services.find(s=>s.id===service);
  const cats = [...new Set(activeServices.map(s=>s.category))];

  function submit(){
    setRdvList(l=>[...l,{id:nextId++,nom:form.nom,tel:form.tel,service,date:selDate,heure:selHour,status:"pending",note:form.note,confirmSent:false}]);
    showToast("הבקשה נשלחה בהצלחה !"); setStep(5);
  }

  if(step===5) return (
    <div className="bk-wrap">
      <div className="success">
        <div className="success-icon">🌸</div>
        <h2>הבקשה נשלחה !</h2>
        <p>קיבלנו את הבקשה שלך.<br/>ניצור איתך קשר לאישור התור בקרוב.</p>
        <div className="scard">
          <div className="sr"><span className="sl">טיפול</span><span className="sv">{svcObj?.icon} {svcObj?.label}</span></div>
          <div className="sr"><span className="sl">תאריך ושעה</span><span className="sv">{fmt(selDate)} בשעה {selHour}</span></div>
          <div className="sr"><span className="sl">שם</span><span className="sv">{form.nom}</span></div>
          <div className="sr"><span className="sl">מחיר משוער</span><span className="sp">₪{svcObj?.price}</span></div>
        </div>
        <button className="btn btn-p" onClick={()=>{setStep(1);setService(null);setSelDate("");setSelHour("");setForm({nom:"",tel:"",note:""});}}>הזמנה חדשה</button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="hero">
        <p className="hero-eye">{config.salonName}</p>
        <h1><em>{config.salonSlogan}</em></h1>
        <p>{config.salonDesc}</p>
        <div className="hero-badges">
          <span className="badge-pill">✅ אישור מהיר</span>
          <span className="badge-pill">💅 ציפורניים והסרת שיער</span>
          <span className="badge-pill">🌿 מוצרים איכותיים</span>
        </div>
      </div>
      <div className="bk-wrap">
        <div className="steps">
          {[4,3,2,1].map((s,i)=>(
            <React.Fragment key={s}>
              <div className={`s-dot ${step>s?"done":step===s?"active":"idle"}`}>{step>s?"✓":s}</div>
              {i<3 && <div className={`s-line ${step>s?"done":""}`}/>}
            </React.Fragment>
          ))}
        </div>

        {step===1 && (
          <div className="card">
            <h3>✨ בחרי את הטיפול</h3>
            <div className="svc-grid">
              {cats.map(cat=>(
                <React.Fragment key={cat}>
                  <div className="svc-cat">{cat}</div>
                  {activeServices.filter(s=>s.category===cat).map(s=>(
                    <div key={s.id} className={`svc-card ${service===s.id?"sel":""}`} onClick={()=>setService(s.id)}>
                      <span className="svc-icon">{s.icon}</span>
                      <div style={{flex:1,textAlign:"right"}}><div className="svc-name">{s.label}</div><div className="svc-meta">{s.duration} דקות</div></div>
                      <span className="svc-price">₪{s.price}</span>
                    </div>
                  ))}
                </React.Fragment>
              ))}
            </div>
            <div className="btn-row"><button className="btn btn-p" disabled={!service} onClick={()=>setStep(2)}>← המשך</button></div>
          </div>
        )}

        {step===2 && (
          <div className="card">
            <h3>📅 תאריך ושעה</h3>
            <div className="cal-hd">
              <button className="cal-nav" onClick={()=>setWo(w=>w+1)}>‹</button>
              <span className="cal-month">{MONTHS[new Date(week[0]).getMonth()]} {new Date(week[0]).getFullYear()}</span>
              <button className="cal-nav" onClick={()=>setWo(w=>Math.max(0,w-1))}>›</button>
            </div>
            <div className="days-grid">
              {week.map((d,i)=>(
                <button key={d} className={`day-btn ${selDate===d?"sel":""}`}
                  disabled={new Date(d)<today} onClick={()=>{setSelDate(d);setSelHour("");}}>
                  <div className="dn">{DAY_LABELS[i]}</div>
                  <div className="dd">{d.split("-")[2]}</div>
                </button>
              ))}
            </div>
            {selDate && (
              <>
                <p style={{fontSize:".82rem",color:"#9a8585",marginBottom:".8rem"}}>שעות פנויות — {fmt(selDate)}</p>
                <div className="hrs-grid">
                  {HOURS.map(h=>(
                    <button key={h} className={`hr-btn ${taken.includes(h)?"taken":""} ${selHour===h?"sel":""}`}
                      disabled={taken.includes(h)} onClick={()=>setSelHour(h)}>{h}</button>
                  ))}
                </div>
              </>
            )}
            <div className="btn-row">
              <button className="btn btn-p" disabled={!selDate||!selHour} onClick={()=>setStep(3)}>← המשך</button>
              <button className="btn btn-s" onClick={()=>setStep(1)}>חזרה →</button>
            </div>
          </div>
        )}

        {step===3 && (
          <div className="card">
            <h3>👤 פרטים אישיים</h3>
            <div className="fg"><label className="fl">שם מלא *</label>
              <input className="fi" placeholder="לדוגמה: שירה כהן" value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
            </div>
            <div className="fg"><label className="fl">טלפון * (050-xxx-xxxx)</label>
              <input className="fi" placeholder="050-123-4567" value={form.tel} onChange={e=>setForm(f=>({...f,tel:e.target.value}))} type="tel"/>
            </div>
            <div className="fg"><label className="fl">הערה (אופציונלי)</label>
              <textarea className="fi" placeholder="רגישויות, העדפות..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="btn-row">
              <button className="btn btn-p" disabled={!form.nom||!form.tel} onClick={()=>setStep(4)}>← המשך</button>
              <button className="btn btn-s" onClick={()=>setStep(2)}>חזרה →</button>
            </div>
          </div>
        )}

        {step===4 && (
          <div className="card">
            <h3>🌸 סיכום הבקשה</h3>
            <div className="sr"><span className="sl">טיפול</span><span className="sv">{svcObj?.icon} {svcObj?.label}</span></div>
            <div className="sr"><span className="sl">משך</span><span className="sv">{svcObj?.duration} דקות</span></div>
            <div className="sr"><span className="sl">תאריך</span><span className="sv">{fmt(selDate)}</span></div>
            <div className="sr"><span className="sl">שעה</span><span className="sv">{selHour}</span></div>
            <div className="sr"><span className="sl">שם</span><span className="sv">{form.nom}</span></div>
            <div className="sr"><span className="sl">טלפון</span><span className="sv">{form.tel}</span></div>
            {form.note && <div className="sr"><span className="sl">הערה</span><span className="sv">{form.note}</span></div>}
            <div className="sr"><span className="sl">מחיר משוער</span><span className="sp">₪{svcObj?.price}</span></div>
            <div className="btn-row">
              <button className="btn btn-p" onClick={submit}>שלח בקשה ✓</button>
              <button className="btn btn-s" onClick={()=>setStep(3)}>חזרה →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ניהול ────────────────────────────────────────────────────────────────────
function AdminPanel({ rdvList, setRdvList, services, setServices, config, setConfig, showToast }) {
  const [authed, setAuthed]       = useState(false);
  const [pwd, setPwd]             = useState("");
  const [pwdErr, setPwdErr]       = useState(false);
  const [section, setSection]     = useState("dashboard");
  const [filter, setFilter]       = useState("all");
  const [wo, setWo]               = useState(0);
  const [confModal, setConfModal] = useState(null);
  const [cliModal, setCliModal]   = useState(null);
  const [copied, setCopied]       = useState(false);

  if(!authed) return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="licon">🔒</div>
        <h2>כניסת מנהלת</h2>
        <p>כניסה שמורה לצוות {config.salonName}</p>
        {pwdErr && <div className="login-error">סיסמה שגויה. נסי שוב.</div>}
        <div className="fg">
          <label className="fl">סיסמה</label>
          <input className="fi" type="password" placeholder="••••••••" value={pwd}
            onChange={e=>setPwd(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){if(pwd===config.adminPassword){setAuthed(true);setPwdErr(false);}else setPwdErr(true);}}}/>
        </div>
        <button className="btn btn-p" style={{width:"100%",marginTop:".5rem"}}
          onClick={()=>{if(pwd===config.adminPassword){setAuthed(true);setPwdErr(false);}else setPwdErr(true);}}>
          כניסה
        </button>
        <p style={{marginTop:"1rem",fontSize:".75rem",color:"#9a8585"}}>סיסמה ברירת מחדל: <em>salon2026</em></p>
      </div>
    </div>
  );

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().split("T")[0];
  const base = new Date(today); base.setDate(today.getDate()+wo*7);
  const week = getDaysOfWeek(base);

  function confirmRdv(id){ setRdvList(l=>l.map(r=>r.id===id?{...r,status:"confirmed"}:r)); showToast("התור אושר !"); }
  function cancelRdv(id){ setRdvList(l=>l.map(r=>r.id===id?{...r,status:"cancelled"}:r)); showToast("התור בוטל."); }
  function markSent(id){ setRdvList(l=>l.map(r=>r.id===id?{...r,confirmSent:true}:r)); }

  function getConfirmMsg(r){
    const svc=services.find(s=>s.id===r.service);
    return config.confirmTemplate
      .replace(/{prenom}/g,r.nom.split(" ")[0])
      .replace(/{nom}/g,r.nom)
      .replace(/{salon}/g,config.salonName)
      .replace(/{date}/g,fmt(r.date))
      .replace(/{heure}/g,r.heure)
      .replace(/{prestation}/g,svc?.label||"")
      .replace(/{duree}/g,String(svc?.duration||""))
      .replace(/{prix}/g,String(svc?.price||""));
  }

  const pending   = rdvList.filter(r=>r.status==="pending").length;
  const confirmed = rdvList.filter(r=>r.status==="confirmed").length;
  const revenue   = rdvList.filter(r=>r.status==="confirmed").reduce((s,r)=>s+(services.find(sv=>sv.id===r.service)?.price||0),0);
  const todayRdv  = rdvList.filter(r=>r.date===todayStr&&r.status!=="cancelled").length;
  const svcStats  = services.map(s=>({label:s.label,icon:s.icon,count:rdvList.filter(r=>r.service===s.id&&r.status==="confirmed").length})).sort((a,b)=>b.count-a.count).filter(s=>s.count>0);
  const maxCount  = svcStats[0]?.count||1;
  const filtered  = rdvList.filter(r=>filter==="all"?true:r.status===filter).sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));

  const cliMap={};
  rdvList.forEach(r=>{
    if(!cliMap[r.nom]) cliMap[r.nom]={nom:r.nom,tel:r.tel,rdvs:[]};
    cliMap[r.nom].rdvs.push(r);
  });
  const clientes = Object.values(cliMap).map(c=>({...c,visits:c.rdvs.filter(r=>r.status==="confirmed").length,lastDate:c.rdvs.filter(r=>r.status==="confirmed").map(r=>r.date).sort().pop()||""})).sort((a,b)=>b.visits-a.visits);
  const selCli = cliModal?cliMap[cliModal]:null;

  const navItems=[
    {id:"dashboard",icon:"📊",label:"לוח בקרה"},
    {id:"rdv",icon:"📋",label:"תורים"},
    {id:"agenda",icon:"📅",label:"יומן"},
    {id:"clientes",icon:"👥",label:"לקוחות"},
    {id:"stats",icon:"📈",label:"סטטיסטיקות"},
    {id:"settings",icon:"⚙️",label:"הגדרות"},
  ];

  return (
    <div className="adm-layout">
      <aside className="adm-side">
        <div className="side-sec" style={{flex:1}}>
          <div className="side-title">תפריט</div>
          {navItems.map(it=>(
            <button key={it.id} className={`side-link ${section===it.id?"active":""}`} onClick={()=>setSection(it.id)}>
              <span>{it.icon}</span>{it.label}
              {it.id==="rdv"&&pending>0&&<span className="badge-n">{pending}</span>}
            </button>
          ))}
        </div>
        <div>
          <button className="side-link" style={{color:"rgba(255,255,255,.4)"}} onClick={()=>setAuthed(false)}>
            <span>🚪</span>יציאה
          </button>
        </div>
      </aside>

      <main className="adm-main">
        {section==="dashboard" && (
          <>
            <div className="adm-hd"><h2>שלום ! 🌸</h2><p>פעילות {config.salonName} היום.</p></div>
            <div className="stats-grid">
              <div className="stat-card"><div className="stat-val">{todayRdv}</div><div className="stat-lbl">תורים היום</div></div>
              <div className="stat-card"><div className="stat-val" style={{color:"#856404"}}>{pending}</div><div className="stat-lbl">ממתינים לאישור</div><div className="stat-sub">⚠ יש לאשר</div></div>
              <div className="stat-card"><div className="stat-val" style={{color:config.accentColor}}>{confirmed}</div><div className="stat-lbl">מאושרים</div></div>
              <div className="stat-card"><div className="stat-val">₪{revenue}</div><div className="stat-lbl">הכנסות מאושרות</div></div>
            </div>
            <h3 style={{marginBottom:"1rem",fontSize:"1.1rem",fontWeight:700}}>
              בקשות ממתינות {pending>0&&<span className="bdg b-pending" style={{fontSize:".78rem",verticalAlign:"middle",marginRight:"8px"}}>{pending} ממתינות</span>}
            </h3>
            {rdvList.filter(r=>r.status==="pending").length===0
              ? <div className="empty"><div className="ei">✅</div><p>אין בקשות ממתינות</p></div>
              : rdvList.filter(r=>r.status==="pending").map(r=>{
                  const svc=services.find(s=>s.id===r.service);
                  return (
                    <div key={r.id} className="card" style={{display:"flex",alignItems:"center",gap:"1rem",padding:"1rem 1.5rem",marginBottom:".8rem",flexDirection:"row-reverse"}}>
                      <div style={{fontSize:"1.7rem"}}>{svc?.icon}</div>
                      <div style={{flex:1,textAlign:"right"}}>
                        <div style={{fontWeight:700}}>{r.nom}</div>
                        <div style={{fontSize:".82rem",color:"#9a8585"}}>{svc?.label} — {fmt(r.date)} בשעה {r.heure}</div>
                        <div style={{fontSize:".78rem",color:"#9a8585"}}>{r.tel}</div>
                        {r.note&&<div style={{fontSize:".77rem",color:"#8fad9b",marginTop:"2px"}}>📝 {r.note}</div>}
                      </div>
                      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                        <button className="act-btn ac" onClick={()=>{confirmRdv(r.id);setConfModal({...r,status:"confirmed"});setCopied(false);}}>✓ אישור</button>
                        <button className="act-btn ar" onClick={()=>cancelRdv(r.id)}>✕ ביטול</button>
                      </div>
                    </div>
                  );
                })
            }
          </>
        )}

        {section==="rdv" && (
          <>
            <div className="adm-hd"><h2>תורים</h2><p>ניהול כל הבקשות.</p></div>
            <div className="rdv-filters">
              {[{id:"all",l:"הכל"},{id:"pending",l:"ממתין"},{id:"confirmed",l:"מאושר"},{id:"cancelled",l:"בוטל"}].map(f=>(
                <button key={f.id} className={`flt ${filter===f.id?"active":""}`} onClick={()=>setFilter(f.id)}>{f.l}</button>
              ))}
            </div>
            <div className="rdv-table">
              <div className="rdv-row hdr"><span>לקוחה</span><span className="rdv-date">תאריך</span><span className="rdv-hr">שעה</span><span className="rdv-svc">טיפול</span><span>סטטוס</span><span>פעולות</span></div>
              {filtered.length===0 && <div className="empty"><div className="ei">📭</div><p>אין תורים</p></div>}
              {filtered.map(r=>{
                const svc=services.find(s=>s.id===r.service);
                return (
                  <div key={r.id} className="rdv-row">
                    <div><div className="cn">{r.nom}</div><div className="cp">{r.tel}</div></div>
                    <span className="rdv-date">{fmt(r.date)}</span>
                    <span className="rdv-hr">{r.heure}</span>
                    <span className="rdv-svc">{svc?.icon} {svc?.label}</span>
                    <span className={`bdg b-${r.status}`}>{r.status==="pending"?"ממתין":r.status==="confirmed"?"מאושר":"בוטל"}</span>
                    <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                      {r.status==="pending"&&<button className="act-btn ac" onClick={()=>{confirmRdv(r.id);setConfModal({...r,status:"confirmed"});setCopied(false);}}>✓</button>}
                      {r.status==="confirmed"&&!r.confirmSent&&<button className="act-btn" style={{background:"#cce5ff",color:"#004085"}} onClick={()=>{setConfModal(r);setCopied(false);}}>📱</button>}
                      {r.status!=="cancelled"&&<button className="act-btn ar" onClick={()=>cancelRdv(r.id)}>✕</button>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {section==="agenda" && (
          <>
            <div className="adm-hd" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"1rem"}}>
              <div><h2>יומן</h2><p>תצוגה שבועית</p></div>
              <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                <button className="cal-nav" onClick={()=>setWo(w=>w+1)}>‹</button>
                <span style={{fontSize:".85rem",color:"#9a8585"}}>{fmt(week[0])} — {fmt(week[5])}</span>
                <button className="cal-nav" onClick={()=>setWo(w=>Math.max(0,w-1))}>›</button>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <div className="ag-grid" style={{minWidth:"580px"}}>
                <div className="ag-hd ag-time"></div>
                {week.map((d,i)=>(
                  <div key={d} className="ag-hd">{DAY_LABELS[i]}<br/><span style={{fontSize:".68rem",fontWeight:400,color:"#9a8585"}}>{d.split("-")[2]}/{d.split("-")[1]}</span></div>
                ))}
                {HOURS.map(h=>(
                  <React.Fragment key={h}>
                    <div className="ag-cell ag-time">{h}</div>
                    {week.map(d=>{
                      const evs=rdvList.filter(r=>r.date===d&&r.heure===h&&r.status!=="cancelled");
                      return (
                        <div key={d} className="ag-cell">
                          {evs.map(r=>{
                            const svc=services.find(s=>s.id===r.service);
                            return <div key={r.id} className={`ag-ev ${r.status==="pending"?"pend":""}`}>{r.nom.split(" ")[0]} {svc?.icon}</div>;
                          })}
                        </div>
                      );
                    })}
                  </React.Fragment>
                ))}
              </div>
            </div>
            <div style={{marginTop:"1rem",display:"flex",gap:"14px",fontSize:".78rem",color:"#9a8585"}}>
              <span><span style={{display:"inline-block",width:10,height:10,background:config.accentColor,borderRadius:3,marginLeft:4}}></span>מאושר</span>
              <span><span style={{display:"inline-block",width:10,height:10,background:"#8fad9b",borderRadius:3,marginLeft:4}}></span>ממתין</span>
            </div>
          </>
        )}

        {section==="clientes" && (
          <>
            <div className="adm-hd"><h2>לקוחות</h2><p>{clientes.length} לקוחות רשומות</p></div>
            {clientes.map(c=>(
              <div key={c.nom} className="cli-card" onClick={()=>setCliModal(c.nom)}>
                <div className="avatar">{c.nom[0]}</div>
                <div style={{flex:1,textAlign:"right"}}>
                  <div className="cli-name">{c.nom}</div>
                  <div className="cli-meta">📱 {c.tel}</div>
                  {c.lastDate&&<div className="cli-meta">🗓 תור אחרון: {fmt(c.lastDate)}</div>}
                </div>
                <div style={{textAlign:"center"}}>
                  <div className="cli-count">{c.visits}</div>
                  <div className="cli-lbl">ביקורות</div>
                </div>
              </div>
            ))}
          </>
        )}

        {section==="stats" && (
          <>
            <div className="adm-hd"><h2>סטטיסטיקות</h2><p>סקירת פעילות העסק</p></div>
            <div className="stats-grid">
              <div className="stat-card"><div className="stat-val">{rdvList.length}</div><div className="stat-lbl">סה"כ בקשות</div></div>
              <div className="stat-card"><div className="stat-val">{confirmed}</div><div className="stat-lbl">מאושרים</div></div>
              <div className="stat-card"><div className="stat-val">₪{revenue}</div><div className="stat-lbl">הכנסות משוערות</div></div>
              <div className="stat-card"><div className="stat-val">{clientes.length}</div><div className="stat-lbl">לקוחות ייחודיות</div></div>
            </div>
            <div className="chart-wrap">
              <div className="chart-title">טיפולים מבוקשים ביותר</div>
              {svcStats.length===0?<p style={{color:"#9a8585",fontSize:".88rem"}}>אין נתונים עדיין</p>:svcStats.map(s=>(
                <div key={s.label} className="bar-row">
                  <span className="bar-label">{s.icon} {s.label}</span>
                  <div className="bar-track"><div className="bar-fill" style={{width:`${(s.count/maxCount)*100}%`}}/></div>
                  <span className="bar-val">{s.count}</span>
                </div>
              ))}
            </div>
            <div className="chart-wrap">
              <div className="chart-title">חלוקת סטטוסים</div>
              {[{l:"מאושרים",v:confirmed,c:"#8fad9b"},{l:"ממתינים",v:pending,c:"#e0c97b"},{l:"בוטלו",v:rdvList.filter(r=>r.status==="cancelled").length,c:"#e8a0a8"}].map(s=>(
                <div key={s.l} className="bar-row">
                  <span className="bar-label">{s.l}</span>
                  <div className="bar-track"><div className="bar-fill" style={{width:`${rdvList.length?(s.v/rdvList.length)*100:0}%`,background:s.c}}/></div>
                  <span className="bar-val" style={{color:s.c}}>{s.v}</span>
                </div>
              ))}
            </div>
          </>
        )}

        {section==="settings" && <SettingsPanel config={config} setConfig={setConfig} services={services} setServices={setServices} showToast={showToast}/>}
      </main>

      {confModal && (
        <div className="modal-bg" onClick={()=>{setConfModal(null);setCopied(false);}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>📱 הודעת אישור</h3>
            <p style={{fontSize:".84rem",color:"#9a8585",marginBottom:"1rem"}}>העתיקי ושלחי ל<strong>{confModal.nom}</strong> בוואטסאפ או SMS.</p>
            <div className="msg-label">הודעה מוכנה לשליחה</div>
            <div className="confirm-msg">{getConfirmMsg(confModal)}</div>
            <button className={`copy-btn ${copied?"copy-done":""}`} onClick={()=>{
              navigator.clipboard?.writeText(getConfirmMsg(confModal)).catch(()=>{});
              setCopied(true); markSent(confModal.id); showToast("ההודעה הועתקה !");
            }}>{copied?"✅ הועתק !":"📋 העתק הודעה"}</button>
            <div className="modal-footer"><button className="btn btn-s" onClick={()=>{setConfModal(null);setCopied(false);}}>סגור</button></div>
          </div>
        </div>
      )}

      {cliModal&&selCli && (
        <div className="modal-bg" onClick={()=>setCliModal(null)}>
          <div className="modal" style={{maxWidth:"520px"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"1.2rem",flexDirection:"row-reverse"}}>
              <div className="avatar" style={{width:52,height:52,fontSize:"1.3rem"}}>{selCli.nom[0]}</div>
              <div style={{textAlign:"right"}}><h3 style={{marginBottom:0}}>{selCli.nom}</h3><div style={{fontSize:".84rem",color:"#9a8585"}}>{selCli.tel}</div></div>
            </div>
            <div style={{display:"flex",gap:"1rem",marginBottom:"1.2rem"}}>
              {[{v:selCli.rdvs.filter(r=>r.status==="confirmed").length,l:"ביקורות"},
                {v:"₪"+selCli.rdvs.filter(r=>r.status==="confirmed").reduce((s,r)=>s+(services.find(sv=>sv.id===r.service)?.price||0),0),l:"הוצאות"}].map(s=>(
                <div key={s.l} className="stat-card" style={{flex:1}}><div className="stat-val">{s.v}</div><div className="stat-lbl">{s.l}</div></div>
              ))}
            </div>
            <div style={{fontSize:"1rem",marginBottom:".8rem",fontWeight:700}}>היסטוריית תורים</div>
            <div style={{maxHeight:"260px",overflowY:"auto"}}>
              {selCli.rdvs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
                const svc=services.find(s=>s.id===r.service);
                return (
                  <div key={r.id} className="hist-item">
                    <span className={`bdg b-${r.status}`} style={{fontSize:".72rem"}}>{r.status==="pending"?"ממתין":r.status==="confirmed"?"✓ מאושר":"בוטל"}</span>
                    <div style={{flex:1,textAlign:"right"}}><div style={{fontSize:".9rem",fontWeight:600}}>{svc?.label}</div><div style={{fontSize:".77rem",color:"#9a8585"}}>{fmt(r.date)} בשעה {r.heure}</div>{r.note&&<div style={{fontSize:".75rem",color:"#8fad9b"}}>📝 {r.note}</div>}</div>
                    <span style={{fontSize:"1.3rem"}}>{svc?.icon}</span>
                  </div>
                );
              })}
            </div>
            <div className="modal-footer"><button className="btn btn-s" onClick={()=>setCliModal(null)}>סגור</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── הגדרות ───────────────────────────────────────────────────────────────────
function SettingsPanel({ config, setConfig, services, setServices, showToast }) {
  const [tab, setTab]           = useState("salon");
  const [draft, setDraft]       = useState({...config});
  const [svcDraft, setSvcDraft] = useState(services.map(s=>({...s})));
  const [newPwd, setNewPwd]     = useState("");
  const [confirmPwd, setConfirmPwd] = useState("");

  function saveGeneral(){ setConfig({...draft}); showToast("ההגדרות נשמרו !"); }
  function saveServices(){ setServices(svcDraft.map(s=>({...s}))); showToast("הטיפולים עודכנו !"); }
  function updateSvc(id,field,val){ setSvcDraft(l=>l.map(s=>s.id===id?{...s,[field]:field==="price"||field==="duration"?Number(val):val}:s)); }
  function deleteSvc(id){ setSvcDraft(l=>l.filter(s=>s.id!==id)); }
  function addSvc(){ setSvcDraft(l=>[...l,{id:`custom-${nextSvcId++}`,label:"טיפול חדש",category:"ציפורניים",duration:30,price:80,icon:"💆",active:true}]); }
  function changePwd(){
    if(!newPwd) return showToast("הכניסי סיסמה חדשה.");
    if(newPwd!==confirmPwd) return showToast("הסיסמאות אינן תואמות !");
    setDraft(d=>({...d,adminPassword:newPwd}));
    setConfig(c=>({...c,adminPassword:newPwd}));
    setNewPwd(""); setConfirmPwd("");
    showToast("הסיסמה עודכנה !");
  }

  return (
    <div>
      <div className="adm-hd"><h2>הגדרות ⚙️</h2><p>התאימי את האפליקציה לפי הצרכים שלך.</p></div>
      <div className="settings-tabs">
        {[{id:"salon",l:"🏪 הסלון"},{id:"visuel",l:"🎨 עיצוב"},{id:"prestations",l:"💅 טיפולים"},{id:"messages",l:"📱 הודעות"},{id:"securite",l:"🔒 אבטחה"}].map(t=>(
          <button key={t.id} className={`stab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>

      {tab==="salon" && (
        <div className="settings-section">
          <h4>🏪 פרטי הסלון</h4>
          <div className="fg"><label className="fl">שם הסלון</label><input className="fi" value={draft.salonName} onChange={e=>setDraft(d=>({...d,salonName:e.target.value}))}/></div>
          <div className="fg"><label className="fl">סלוגן</label><input className="fi" value={draft.salonSlogan} onChange={e=>setDraft(d=>({...d,salonSlogan:e.target.value}))}/></div>
          <div className="fg"><label className="fl">תיאור קצר</label><textarea className="fi" value={draft.salonDesc} onChange={e=>setDraft(d=>({...d,salonDesc:e.target.value}))}/></div>
          <div style={{display:"flex",justifyContent:"flex-start"}}><button className="btn btn-p" onClick={saveGeneral}>💾 שמור</button></div>
        </div>
      )}

      {tab==="visuel" && (
        <div className="settings-section">
          <h4>🎨 צבע ראשי</h4>
          <p style={{fontSize:".83rem",color:"#9a8585",marginBottom:"1.2rem"}}>הצבע שנבחר יחול על כל הממשק באופן מיידי.</p>
          <div className="color-row">
            <div className="color-swatch"><input type="color" value={draft.accentColor} onChange={e=>setDraft(d=>({...d,accentColor:e.target.value,accentLight:e.target.value+"22"}))}/></div>
            <span style={{fontSize:".9rem",fontWeight:600}}>{draft.accentColor}</span>
          </div>
          <div style={{marginBottom:"1.5rem"}}>
            <div className="fl" style={{marginBottom:".6rem"}}>צבעים מוכנים</div>
            <div className="color-presets">
              {COLOR_PRESETS.map(c=>(
                <div key={c} className={`color-preset ${draft.accentColor===c?"sel":""}`} style={{background:c}}
                  onClick={()=>setDraft(d=>({...d,accentColor:c,accentLight:c+"22"}))}/>
              ))}
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-start"}}><button className="btn btn-p" style={{background:draft.accentColor}} onClick={saveGeneral}>💾 החל</button></div>
        </div>
      )}

      {tab==="prestations" && (
        <div className="settings-section">
          <h4>💅 ניהול טיפולים</h4>
          <p style={{fontSize:".83rem",color:"#9a8585",marginBottom:"1.2rem"}}>ערכי שמות, מחירים, משכים. כבי/הפעילי טיפול להסתרתו מהלקוחות.</p>
          <div className="svc-editor-row svc-editor-header" style={{paddingTop:0}}>
            <span>אייקון</span><span>שם</span><span>קטגוריה</span><span>דקות</span><span>מחיר ₪</span><span>פעיל</span><span></span>
          </div>
          {svcDraft.map(s=>(
            <div key={s.id} className="svc-editor-row">
              <select className="mini-input" value={s.icon} style={{padding:"5px 4px",fontSize:"1.1rem"}} onChange={e=>updateSvc(s.id,"icon",e.target.value)}>
                {["💅","✨","🎨","🌸","🌿","🌺","🍃","💆","🧖","💇","👄","💋","🌙","⭐","🌟","🦋","🌷","🪷","🧴","💎"].map(ic=><option key={ic} value={ic}>{ic}</option>)}
              </select>
              <input className="mini-input" value={s.label} onChange={e=>updateSvc(s.id,"label",e.target.value)}/>
              <select className="mini-input" value={s.category} onChange={e=>updateSvc(s.id,"category",e.target.value)}>
                <option>ציפורניים</option><option>הסרת שיער</option><option>טיפולי פנים</option><option>אחר</option>
              </select>
              <input className="mini-input" type="number" min="5" step="5" value={s.duration} onChange={e=>updateSvc(s.id,"duration",e.target.value)}/>
              <input className="mini-input" type="number" min="1" value={s.price} onChange={e=>updateSvc(s.id,"price",e.target.value)}/>
              <label className="toggle">
                <input type="checkbox" checked={s.active} onChange={e=>updateSvc(s.id,"active",e.target.checked)}/>
                <span className="toggle-slider"></span>
              </label>
              <button className="del-btn" onClick={()=>deleteSvc(s.id)}>✕</button>
            </div>
          ))}
          <button className="add-svc-btn" onClick={addSvc}>+ הוסף טיפול</button>
          <div style={{display:"flex",justifyContent:"flex-start",marginTop:"1.2rem"}}><button className="btn btn-p" onClick={saveServices}>💾 שמור טיפולים</button></div>
        </div>
      )}

      {tab==="messages" && (
        <div className="settings-section">
          <h4>📱 הודעת אישור SMS / וואטסאפ</h4>
          <p style={{fontSize:".83rem",color:"#9a8585",marginBottom:"1rem"}}>לחצי על משתנה להוספתו להודעה:</p>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"1.2rem"}}>
            {["{prenom}","{nom}","{salon}","{date}","{heure}","{prestation}","{duree}","{prix}"].map(v=>(
              <span key={v} style={{background:draft.accentLight,color:draft.accentColor,borderRadius:"6px",padding:"3px 10px",fontSize:".78rem",fontWeight:700,fontFamily:"monospace",cursor:"pointer",direction:"ltr"}}
                onClick={()=>setDraft(d=>({...d,confirmTemplate:d.confirmTemplate+v}))}>{v}</span>
            ))}
          </div>
          <div className="fg"><label className="fl">תבנית הודעה</label>
            <textarea className="fi" style={{minHeight:"180px",fontFamily:"monospace",fontSize:".88rem"}} value={draft.confirmTemplate} onChange={e=>setDraft(d=>({...d,confirmTemplate:e.target.value}))}/>
          </div>
          <div className="fl" style={{marginBottom:".6rem"}}>תצוגה מקדימה</div>
          <div className="confirm-msg">{draft.confirmTemplate.replace(/{prenom}/g,"שירה").replace(/{nom}/g,"שירה כהן").replace(/{salon}/g,draft.salonName).replace(/{date}/g,"12/03/2026").replace(/{heure}/g,"14:30").replace(/{prestation}/g,"ג'ל מניקור").replace(/{duree}/g,"90").replace(/{prix}/g,"180")}</div>
          <div style={{display:"flex",justifyContent:"flex-start",marginTop:"1rem"}}><button className="btn btn-p" onClick={saveGeneral}>💾 שמור</button></div>
        </div>
      )}

      {tab==="securite" && (
        <div className="settings-section">
          <h4>🔒 שינוי סיסמת מנהל</h4>
          <p style={{fontSize:".83rem",color:"#9a8585",marginBottom:"1.2rem"}}>סיסמה נוכחית: <strong>{config.adminPassword}</strong></p>
          <div className="fg"><label className="fl">סיסמה חדשה</label><input className="fi" type="password" placeholder="••••••••" value={newPwd} onChange={e=>setNewPwd(e.target.value)}/></div>
          <div className="fg"><label className="fl">אישור סיסמה</label><input className="fi" type="password" placeholder="••••••••" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)}/></div>
          {newPwd&&confirmPwd&&newPwd!==confirmPwd&&<div style={{color:"#b92b27",fontSize:".82rem",marginBottom:"1rem"}}>⚠ הסיסמאות אינן תואמות.</div>}
          <div style={{display:"flex",justifyContent:"flex-start"}}><button className="btn btn-p" onClick={changePwd}>🔑 עדכן סיסמה</button></div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
