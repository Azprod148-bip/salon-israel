function getDaysOfWeek(base) {
  const d = new Date(base);
  const day = d.getDay();
  const sun = new Date(d);
  sun.setDate(d.getDate() - day);
  return Array.from({length:6},(_,i)=>{ const dd=new Date(sun); dd.setDate(sun.getDate()+i+1); return dd.toISOString().split("T")[0]; });
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

.loader{text-align:center;padding:4rem;color:#9a8585;font-size:1.1rem;}
.empty{text-align:center;padding:2.5rem;color:#9a8585;}
.chart-wrap{background:#fff;border-radius:14px;padding:1.4rem;box-shadow:0 4px 24px rgba(${rgb},.10);margin-bottom:1.5rem;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-direction:row-reverse;}
.bar-label{font-size:.76rem;color:#9a8585;width:130px;flex-shrink:0;text-align:right;}
.bar-track{flex:1;background:${cfg.accentLight};border-radius:20px;height:9px;overflow:hidden;}
.bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#e8a0a8,${cfg.accentColor});transition:width .6s;}
.bar-val{font-size:.76rem;color:${cfg.accentColor};font-weight:700;width:30px;}
`;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView]         = useState("booking");
  const [config, setConfig]     = useState(DEFAULT_CONFIG);
  const [services, setServices] = useState(DEFAULT_SERVICES);
  const [rdvList, setRdvList]   = useState([]);
  const [schedule, setSchedule] = useState({}); // { "2026-03-10": { open:true, hours:["09:00",...] } }
  const [loading, setLoading]   = useState(true);
  const [toast, setToast]       = useState(null);
  const styleRef = useRef(null);

  // ── טעינה מ-Firebase ──
  useEffect(()=>{
    // config
    db.ref("config").on("value", snap=>{
      if(snap.val()) setConfig(c=>({...DEFAULT_CONFIG,...snap.val()}));
    });
    // services
    db.ref("services").on("value", snap=>{
      if(snap.val()) setServices(Object.values(snap.val()));
      else saveToFb("services", arrToObj(DEFAULT_SERVICES));
    });
    // rdv
    db.ref("rdv").on("value", snap=>{
      if(snap.val()) setRdvList(Object.entries(snap.val()).map(([k,v])=>({...v,fbKey:k})));
      else setRdvList([]);
      setLoading(false);
    });
    // schedule
    db.ref("schedule").on("value", snap=>{
      if(snap.val()) setSchedule(snap.val());
      else setSchedule({});
    });
  },[]);

  useEffect(()=>{
    if(!styleRef.current){ styleRef.current=document.createElement("style"); document.head.appendChild(styleRef.current); }
    styleRef.current.textContent = buildCss(config);
  },[config]);

  function showToast(msg){ setToast(msg); setTimeout(()=>setToast(null),3000); }
  function arrToObj(arr){ const o={}; arr.forEach(s=>{ o[s.id]=s; }); return o; }

  function saveToFb(path, data){ db.ref(path).set(data); }

  function saveConfig(cfg){
    setConfig(cfg);
    db.ref("config").set(cfg);
    showToast("ההגדרות נשמרו !");
  }
  function saveServices(svcs){
    setServices(svcs);
    db.ref("services").set(arrToObj(svcs));
    showToast("הטיפולים עודכנו !");
  }
  function addRdv(rdv){
    const ref = db.ref("rdv").push();
    ref.set({...rdv, fbKey: ref.key});
  }
  function updateRdv(fbKey, data){
    db.ref(`rdv/${fbKey}`).update(data);
  }
  function saveSchedule(s){
    setSchedule(s);
    db.ref("schedule").set(s);
  }

  if(loading) return <div className="loader">🌸 טוען...</div>;

  return (
    <div>
      <nav className="nav">
        <span className="nav-logo">🌸 {config.salonName}</span>
        <div className="nav-tabs">
          <button className={`nav-tab ${view==="booking"?"active":""}`} onClick={()=>setView("booking")}>הזמנת תור</button>
          <button className={`nav-tab ${view==="admin"?"active":""}`} onClick={()=>setView("admin")}>ניהול</button>
        </div>
      </nav>
      {view==="booking"
        ? <BookingFlow rdvList={rdvList} services={services} config={config} schedule={schedule} addRdv={addRdv} showToast={showToast}/>
        : <AdminPanel  rdvList={rdvList} services={services} config={config} schedule={schedule}
            updateRdv={updateRdv} saveConfig={saveConfig} saveServices={saveServices} saveSchedule={saveSchedule} showToast={showToast}/>
      }
      {toast && <div className="toast">✅ {toast}</div>}
    </div>
  );
}

// ─── הזמנת תור ────────────────────────────────────────────────────────────────
function BookingFlow({ rdvList, services, config, schedule, addRdv, showToast }) {
  const [step, setStep]       = useState(1);
  const [service, setService] = useState(null);
  const [selDate, setSelDate] = useState("");
  const [selHour, setSelHour] = useState("");
  const [form, setForm]       = useState({nom:"",tel:"",note:""});
  const [wo, setWo]           = useState(0);
  const [done, setDone]       = useState(false);

  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(today); base.setDate(today.getDate()+wo*7);
  const week = getDaysOfWeek(base);

  const daySchedule = schedule[selDate] || { open:false, hours:[] };
  const takenHours  = rdvList.filter(r=>r.date===selDate&&r.status!=="cancelled").map(r=>r.heure);
  const availHours  = (daySchedule.hours||[]).filter(h=>!takenHours.includes(h));

  const activeServices = services.filter(s=>s.active);
  const svcObj = services.find(s=>s.id===service);
  const cats = [...new Set(activeServices.map(s=>s.category))];

  function submit(){
    addRdv({nom:form.nom,tel:form.tel,service,date:selDate,heure:selHour,status:"pending",note:form.note,confirmSent:false,createdAt:Date.now()});
    showToast("הבקשה נשלחה !");
    setDone(true);
  }

  if(done) return (
    <div className="wrap">
      <div className="success">
        <div className="success-icon">🌸</div>
        <h2>הבקשה נשלחה !</h2>
        <p>קיבלנו את הבקשה שלך.<br/>ניצור איתך קשר לאישור בקרוב.</p>
        <div className="scard">
          <div className="sr"><span className="sl">טיפול</span><span className="sv">{svcObj?.icon} {svcObj?.label}</span></div>
          <div className="sr"><span className="sl">תאריך</span><span className="sv">{fmt(selDate)} בשעה {selHour}</span></div>
          <div className="sr"><span className="sl">שם</span><span className="sv">{form.nom}</span></div>
          <div className="sr"><span className="sl">מחיר משוער</span><span className="sp">₪{svcObj?.price}</span></div>
        </div>
        <button className="btn btn-p" onClick={()=>{setDone(false);setStep(1);setService(null);setSelDate("");setSelHour("");setForm({nom:"",tel:"",note:""});}}>הזמנה חדשה</button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="hero">
        <h1><em>{config.salonSlogan}</em></h1>
        <p>{config.salonDesc}</p>
        <div className="hero-badges">
          <span className="badge-pill">✅ אישור מהיר</span>
          <span className="badge-pill">💅 ציפורניים והסרת שיער</span>
          <span className="badge-pill">🌿 מוצרים איכותיים</span>
        </div>
      </div>
      <div className="wrap">
        <div className="steps">
          {[4,3,2,1].map((s,i)=>(
            <React.Fragment key={s}>
              <div className={`s-dot ${step>s?"done":step===s?"active":"idle"}`}>{step>s?"✓":s}</div>
              {i<3&&<div className={`s-line ${step>s?"done":""}`}/>}
            </React.Fragment>
          ))}
        </div>

        {step===1 && (
          <div className="card">
            <h3>✨ בחרי טיפול</h3>
            <div className="svc-grid">
              {cats.map(cat=>(
                <React.Fragment key={cat}>
                  <div className="svc-cat">{cat}</div>
                  {activeServices.filter(s=>s.category===cat).map(s=>(
                    <div key={s.id} className={`svc-card ${service===s.id?"sel":""}`} onClick={()=>setService(s.id)}>
                      <span className="svc-icon">{s.icon}</span>
                      <div style={{flex:1,textAlign:"right"}}><div className="svc-name">{s.label}</div><div className="svc-meta">{s.duration} דקות</div></div>
                      <span className="svc-price">₪{s.price}</span>
                    </div>
                  ))}
                </React.Fragment>
              ))}
            </div>
            <div className="btn-row"><button className="btn btn-p" disabled={!service} onClick={()=>setStep(2)}>← המשך</button></div>
          </div>
        )}

        {step===2 && (
          <div className="card">
            <h3>📅 בחרי תאריך ושעה</h3>
            <div className="cal-hd">
              <button className="cal-nav" onClick={()=>setWo(w=>w+1)}>‹</button>
              <span className="cal-month">{MONTHS[new Date(week[0]).getMonth()]} {new Date(week[0]).getFullYear()}</span>
              <button className="cal-nav" onClick={()=>setWo(w=>Math.max(0,w-1))}>›</button>
            </div>
            <div className="days-grid">
              {week.map((d,i)=>{
                const s = schedule[d];
                const isClosed = !s || !s.open;
                const isPast = new Date(d) < today;
                return (
                  <button key={d} className={`day-btn ${selDate===d?"sel":""} ${isClosed&&!isPast?"closed":""}`}
                    disabled={isPast||isClosed}
                    onClick={()=>{setSelDate(d);setSelHour("");}}>
                    <div className="dn">{DAY_LABELS[i]}</div>
                    <div className="dd">{d.split("-")[2]}</div>
                    {!isPast&&isClosed&&<div style={{fontSize:".55rem",color:"#e8a0a8",marginTop:"2px"}}>סגור</div>}
                  </button>
                );
              })}
            </div>
            {selDate && (
              <>
                <p style={{fontSize:".8rem",color:"#9a8585",marginBottom:".8rem"}}>שעות פנויות — {fmt(selDate)}</p>
                {availHours.length===0
                  ? <p style={{color:"#e8a0a8",fontSize:".86rem",textAlign:"center",padding:"1rem"}}>אין שעות פנויות ביום זה</p>
                  : <div className="hrs-grid">
                      {(daySchedule.hours||[]).map(h=>{
                        const taken = takenHours.includes(h);
                        return <button key={h} className={`hr-btn ${taken?"taken":""} ${selHour===h?"sel":""}`}
                          disabled={taken} onClick={()=>setSelHour(h)}>{h}</button>;
                      })}
                    </div>
                }
              </>
            )}
            <div className="btn-row">
              <button className="btn btn-p" disabled={!selDate||!selHour} onClick={()=>setStep(3)}>← המשך</button>
              <button className="btn btn-s" onClick={()=>setStep(1)}>חזרה →</button>
            </div>
          </div>
        )}

        {step===3 && (
          <div className="card">
            <h3>👤 פרטים אישיים</h3>
            <div className="fg"><label className="fl">שם מלא *</label>
              <input className="fi" placeholder="לדוגמה: שירה כהן" value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
            </div>
            <div className="fg"><label className="fl">טלפון * (050-xxx-xxxx)</label>
              <input className="fi" placeholder="050-123-4567" type="tel" value={form.tel} onChange={e=>setForm(f=>({...f,tel:e.target.value}))}/>
            </div>
            <div className="fg"><label className="fl">הערה (אופציונלי)</label>
              <textarea className="fi" placeholder="רגישויות, העדפות..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="btn-row">
              <button className="btn btn-p" disabled={!form.nom||!form.tel} onClick={()=>setStep(4)}>← המשך</button>
              <button className="btn btn-s" onClick={()=>setStep(2)}>חזרה →</button>
            </div>
          </div>
        )}

        {step===4 && (
          <div className="card">
            <h3>🌸 סיכום</h3>
            <div className="sr"><span className="sl">טיפול</span><span className="sv">{svcObj?.icon} {svcObj?.label}</span></div>
            <div className="sr"><span className="sl">משך</span><span className="sv">{svcObj?.duration} דקות</span></div>
            <div className="sr"><span className="sl">תאריך</span><span className="sv">{fmt(selDate)}</span></div>
            <div className="sr"><span className="sl">שעה</span><span className="sv">{selHour}</span></div>
            <div className="sr"><span className="sl">שם</span><span className="sv">{form.nom}</span></div>
            <div className="sr"><span className="sl">טלפון</span><span className="sv">{form.tel}</span></div>
            {form.note&&<div className="sr"><span className="sl">הערה</span><span className="sv">{form.note}</span></div>}
            <div className="sr"><span className="sl">מחיר משוער</span><span className="sp">₪{svcObj?.price}</span></div>
            <div className="btn-row">
              <button className="btn btn-p" onClick={submit}>שלח בקשה ✓</button>
              <button className="btn btn-s" onClick={()=>setStep(3)}>חזרה →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── אדמין ────────────────────────────────────────────────────────────────────
function AdminPanel({ rdvList, services, config, schedule, updateRdv, saveConfig, saveServices, saveSchedule, showToast }) {
  const [authed, setAuthed]       = useState(false);
  const [pwd, setPwd]             = useState("");
  const [pwdErr, setPwdErr]       = useState(false);
  const [section, setSection]     = useState("dashboard");
  const [filter, setFilter]       = useState("all");
  const [confModal, setConfModal] = useState(null);
  const [cliModal, setCliModal]   = useState(null);
  const [copied, setCopied]       = useState(false);

  if(!authed) return (
    <div className="login-wrap">
      <div className="login-box">
        <div style={{fontSize:"2.5rem",marginBottom:"1rem"}}>🔒</div>
        <h2>כניסת מנהלת</h2>
        <p>כניסה שמורה לצוות הסלון</p>
        {pwdErr && <div className="login-error">סיסמה שגויה. נסי שוב.</div>}
        <div className="fg"><label className="fl">סיסמה</label>
          <input className="fi" type="password" placeholder="••••••••" value={pwd}
            onChange={e=>setPwd(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){if(pwd===config.adminPassword){setAuthed(true);}else setPwdErr(true);}}}/>
        </div>
        <button className="btn btn-p" style={{width:"100%",marginTop:".5rem"}}
          onClick={()=>{if(pwd===config.adminPassword){setAuthed(true);setPwdErr(false);}else setPwdErr(true);}}>כניסה</button>
        <p style={{marginTop:"1rem",fontSize:".75rem",color:"#9a8585"}}>סיסמה ברירת מחדל: <em>salon2026</em></p>
      </div>
    </div>
  );

  const pending   = rdvList.filter(r=>r.status==="pending").length;
  const confirmed = rdvList.filter(r=>r.status==="confirmed").length;
  const todayRdv  = rdvList.filter(r=>r.date===todayStr()&&r.status!=="cancelled").length;
  const revenue   = rdvList.filter(r=>r.status==="confirmed").reduce((s,r)=>s+(services.find(sv=>sv.id===r.service)?.price||0),0);
  const filtered  = rdvList.filter(r=>filter==="all"||r.status===filter).sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));

  function confirmRdv(r){ updateRdv(r.fbKey,{status:"confirmed"}); showToast("התור אושר !"); }
  function cancelRdv(r){ updateRdv(r.fbKey,{status:"cancelled"}); showToast("התור בוטל."); }
  function markSent(r){ updateRdv(r.fbKey,{confirmSent:true}); }

  function getMsg(r){
    const svc=services.find(s=>s.id===r.service);
    return config.confirmTemplate
      .replace(/{prenom}/g,r.nom.split(" ")[0])
      .replace(/{nom}/g,r.nom)
      .replace(/{salon}/g,config.salonName)
      .replace(/{date}/g,fmt(r.date))
      .replace(/{heure}/g,r.heure)
      .replace(/{prestation}/g,svc?.label||"")
      .replace(/{duree}/g,String(svc?.duration||""))
      .replace(/{prix}/g,String(svc?.price||""));
  }

  const cliMap={};
  rdvList.forEach(r=>{
    if(!cliMap[r.nom]) cliMap[r.nom]={nom:r.nom,tel:r.tel,rdvs:[]};
    cliMap[r.nom].rdvs.push(r);
  });
  const clientes = Object.values(cliMap).sort((a,b)=>b.rdvs.filter(r=>r.status==="confirmed").length-a.rdvs.filter(r=>r.status==="confirmed").length);
  const selCli = cliModal?cliMap[cliModal]:null;

  const svcStats = services.map(s=>({label:s.label,icon:s.icon,count:rdvList.filter(r=>r.service===s.id&&r.status==="confirmed").length})).sort((a,b)=>b.count-a.count).filter(s=>s.count>0);
  const maxCount = svcStats[0]?.count||1;

  const navItems=[
    {id:"dashboard",icon:"📊",label:"לוח בקרה"},
    {id:"rdv",icon:"📋",label:"תורים"},
    {id:"availability",icon:"🗓",label:"זמינות"},
    {id:"clientes",icon:"👥",label:"לקוחות"},
    {id:"stats",icon:"📈",label:"סטטיסטיקות"},
    {id:"settings",icon:"⚙️",label:"הגדרות"},
  ];

  return (
    <div className="adm-layout">
      <aside className="adm-side">
        <div style={{flex:1}}>
          <div className="side-title">תפריט</div>
          {navItems.map(it=>(
            <button key={it.id} className={`side-link ${section===it.id?"active":""}`} onClick={()=>setSection(it.id)}>
              <span>{it.icon}</span>{it.label}
              {it.id==="rdv"&&pending>0&&<span className="badge-n">{pending}</span>}
            </button>
          ))}
        </div>
        <button className="side-link" style={{color:"rgba(255,255,255,.4)"}} onClick={()=>setAuthed(false)}>
          <span>🚪</span>יציאה
        </button>
      </aside>

      <main className="adm-main">

        {/* ── לוח בקרה ── */}
        {section==="dashboard" && <>
          <div className="adm-hd"><h2>שלום ! 🌸</h2><p>פעילות הסלון היום</p></div>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-val">{todayRdv}</div><div className="stat-lbl">תורים היום</div></div>
            <div className="stat-card"><div className="stat-val" style={{color:"#856404"}}>{pending}</div><div className="stat-lbl">ממתינים לאישור</div></div>

            <div className="stat-card"><div className="stat-val">₪{revenue}</div><div className="stat-lbl">הכנסות</div></div>
          </div>
          <h3 style={{marginBottom:"1rem",fontWeight:700,fontSize:"1rem"}}>בקשות ממתינות {pending>0&&<span className="bdg b-pending" style={{verticalAlign:"middle",marginRight:"8px"}}>{pending}</span>}</h3>
          {rdvList.filter(r=>r.status==="pending").length===0
            ? <div className="empty">✅ אין בקשות ממתינות</div>
            : rdvList.filter(r=>r.status==="pending").sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure)).map(r=>{
                const svc=services.find(s=>s.id===r.service);
                return (
                  <div key={r.fbKey} className="card" style={{display:"flex",alignItems:"center",gap:"1rem",padding:"1rem 1.3rem",marginBottom:".7rem",flexDirection:"row-reverse"}}>
                    <div style={{fontSize:"1.5rem"}}>{svc?.icon}</div>
                    <div style={{flex:1,textAlign:"right"}}>
                      <div style={{fontWeight:700}}>{r.nom}</div>
                      <div style={{fontSize:".8rem",color:"#9a8585"}}>{svc?.label} — {fmt(r.date)} בשעה {r.heure}</div>
                      <div style={{fontSize:".76rem",color:"#9a8585"}}>{r.tel}</div>
                      {r.note&&<div style={{fontSize:".75rem",color:"#8fad9b"}}>📝 {r.note}</div>}
                    </div>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button className="act-btn ac" onClick={()=>{confirmRdv(r);setConfModal(r);setCopied(false);}}>✓ אישור</button>
                      <button className="act-btn ar" onClick={()=>cancelRdv(r)}>✕</button>
                    </div>
                  </div>
                );
              })
          }
        </>}

        {/* ── תורים ── */}
        {section==="rdv" && <>
          <div className="adm-hd"><h2>תורים</h2><p>ניהול כל הבקשות</p></div>
          <div className="rdv-filters">
            {[{id:"all",l:"הכל"},{id:"pending",l:"ממתין"},{id:"confirmed",l:"מאושר"},{id:"cancelled",l:"בוטל"}].map(f=>(
              <button key={f.id} className={`flt ${filter===f.id?"active":""}`} onClick={()=>setFilter(f.id)}>{f.l}</button>
            ))}
          </div>
          <div className="rdv-table">
            <div className="rdv-row hdr"><span>לקוחה</span><span>תאריך</span><span>שעה</span><span>סטטוס</span><span>פעולות</span></div>
            {filtered.length===0 && <div className="empty">📭 אין תורים</div>}
            {filtered.map(r=>{
              const svc=services.find(s=>s.id===r.service);
              return (
                <div key={r.fbKey} className="rdv-row">
                  <div><div className="cn">{r.nom}</div><div className="cp">{r.tel}</div><div className="cp">{svc?.icon} {svc?.label}</div></div>
                  <span>{fmt(r.date)}</span>
                  <span>{r.heure}</span>
                  <span className={`bdg b-${r.status}`}>{r.status==="pending"?"ממתין":r.status==="confirmed"?"מאושר":"בוטל"}</span>
                  <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                    {r.status==="pending"&&<button className="act-btn ac" onClick={()=>{confirmRdv(r);setConfModal(r);setCopied(false);}}>✓</button>}
                    {r.status==="confirmed"&&!r.confirmSent&&<button className="act-btn" style={{background:"#cce5ff",color:"#004085"}} onClick={()=>{setConfModal(r);setCopied(false);}}>📱</button>}
                    {r.status!=="cancelled"&&<button className="act-btn ar" onClick={()=>cancelRdv(r)}>✕</button>}
                  </div>
                </div>
              );
            })}
          </div>
        </>}

        {/* ── זמינות ── */}
        {section==="availability" && <AvailabilityPanel schedule={schedule} saveSchedule={saveSchedule} showToast={showToast}/>}

        {/* ── לקוחות ── */}
        {section==="clientes" && <>
          <div className="adm-hd"><h2>לקוחות</h2><p>{clientes.length} לקוחות רשומות</p></div>
          {clientes.map(c=>{
            const visits=c.rdvs.filter(r=>r.status==="confirmed").length;
            const lastDate=c.rdvs.filter(r=>r.status==="confirmed").map(r=>r.date).sort().pop()||"";
            return (
              <div key={c.nom} className="cli-card" onClick={()=>setCliModal(c.nom)}>
                <div className="avatar">{c.nom[0]}</div>
                <div style={{flex:1,textAlign:"right"}}>
                  <div style={{fontWeight:700}}>{c.nom}</div>
                  <div style={{fontSize:".78rem",color:"#9a8585"}}>📱 {c.tel}</div>
                  {lastDate&&<div style={{fontSize:".78rem",color:"#9a8585"}}>🗓 תור אחרון: {fmt(lastDate)}</div>}
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"1.6rem",fontWeight:700,color:config.accentColor}}>{visits}</div>
                  <div style={{fontSize:".68rem",color:"#9a8585"}}>ביקורות</div>
                </div>
              </div>
            );
          })}
        </>}

        {/* ── סטטיסטיקות ── */}
        {section==="stats" && <>
          <div className="adm-hd"><h2>סטטיסטיקות</h2></div>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-val">{rdvList.length}</div><div className="stat-lbl">סה"כ בקשות</div></div>
            <div className="stat-card"><div className="stat-val">{confirmed}</div><div className="stat-lbl">מאושרים</div></div>
            <div className="stat-card"><div className="stat-val">₪{revenue}</div><div className="stat-lbl">הכנסות</div></div>
            <div className="stat-card"><div className="stat-val">{clientes.length}</div><div className="stat-lbl">לקוחות</div></div>
          </div>
          <div className="chart-wrap">
            <div style={{fontWeight:700,marginBottom:"1rem"}}>טיפולים מבוקשים</div>
            {svcStats.length===0?<p style={{color:"#9a8585",fontSize:".86rem"}}>אין נתונים עדיין</p>:svcStats.map(s=>(
              <div key={s.label} className="bar-row">
                <span className="bar-label">{s.icon} {s.label}</span>
                <div className="bar-track"><div className="bar-fill" style={{width:`${(s.count/maxCount)*100}%`}}/></div>
                <span className="bar-val">{s.count}</span>
              </div>
            ))}
          </div>
        </>}

        {/* ── הגדרות ── */}
        {section==="settings" && <SettingsPanel config={config} services={services} saveConfig={saveConfig} saveServices={saveServices} showToast={showToast}/>}

      </main>

      {/* מודל אישור */}
      {confModal && (
        <div className="modal-bg" onClick={()=>{setConfModal(null);setCopied(false);}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>📱 הודעת אישור</h3>
            <p style={{fontSize:".82rem",color:"#9a8585",marginBottom:".8rem"}}>שלחי ל<strong>{confModal.nom}</strong> בוואטסאפ או SMS:</p>
            <div className="confirm-msg">{getMsg(confModal)}</div>
            <button className={`copy-btn ${copied?"copy-done":""}`} onClick={()=>{
              navigator.clipboard?.writeText(getMsg(confModal)).catch(()=>{});
              setCopied(true); markSent(confModal); showToast("ההודעה הועתקה !");
            }}>{copied?"✅ הועתק !":"📋 העתק הודעה"}</button>
            <div className="modal-footer"><button className="btn btn-s" onClick={()=>{setConfModal(null);setCopied(false);}}>סגור</button></div>
          </div>
        </div>
      )}

      {/* מודל לקוחה */}
      {cliModal&&selCli && (
        <div className="modal-bg" onClick={()=>setCliModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"1.2rem",flexDirection:"row-reverse"}}>
              <div className="avatar" style={{width:48,height:48,fontSize:"1.1rem"}}>{selCli.nom[0]}</div>
              <div><h3 style={{marginBottom:0}}>{selCli.nom}</h3><div style={{fontSize:".82rem",color:"#9a8585"}}>{selCli.tel}</div></div>
            </div>
            <div style={{display:"flex",gap:".8rem",marginBottom:"1rem"}}>
              {[{v:selCli.rdvs.filter(r=>r.status==="confirmed").length,l:"ביקורות"},
                {v:"₪"+selCli.rdvs.filter(r=>r.status==="confirmed").reduce((s,r)=>s+(services.find(sv=>sv.id===r.service)?.price||0),0),l:"הוצאות"}].map(s=>(
                <div key={s.l} className="stat-card" style={{flex:1}}><div className="stat-val">{s.v}</div><div className="stat-lbl">{s.l}</div></div>
              ))}
            </div>
            <div style={{fontWeight:700,marginBottom:".8rem"}}>היסטוריה</div>
            <div style={{maxHeight:"240px",overflowY:"auto"}}>
              {selCli.rdvs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
                const svc=services.find(s=>s.id===r.service);
                return (
                  <div key={r.fbKey||r.date+r.heure} style={{display:"flex",alignItems:"center",gap:"10px",padding:"9px 0",borderBottom:"1px solid #fdf0f2",flexDirection:"row-reverse"}}>
                    <span style={{fontSize:"1.2rem"}}>{svc?.icon}</span>
                    <div style={{flex:1,textAlign:"right"}}><div style={{fontSize:".88rem",fontWeight:600}}>{svc?.label}</div><div style={{fontSize:".75rem",color:"#9a8585"}}>{fmt(r.date)} בשעה {r.heure}</div></div>
                    <span className={`bdg b-${r.status}`}>{r.status==="pending"?"ממתין":r.status==="confirmed"?"✓":"בוטל"}</span>
                  </div>
                );
              })}
            </div>
            <div className="modal-footer"><button className="btn btn-s" onClick={()=>setCliModal(null)}>סגור</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── זמינות ───────────────────────────────────────────────────────────────────
function AvailabilityPanel({ schedule, saveSchedule, showToast }) {
  const [wo, setWo] = useState(0);
  const [localSched, setLocalSched] = useState({...schedule});

  useEffect(()=>{ setLocalSched({...schedule}); },[schedule]);

  const today = new Date(); today.setHours(0,0,0,0);
  const base  = new Date(today); base.setDate(today.getDate()+wo*7);
  const week  = getDaysOfWeek(base);

  function toggleDay(date, open){
    const updated = {...localSched, [date]: {...(localSched[date]||{hours:[]}), open}};
    setLocalSched(updated);
  }
  function toggleHour(date, hour){
    const day = localSched[date] || {open:true, hours:[]};
    const hours = day.hours.includes(hour) ? day.hours.filter(h=>h!==hour) : [...day.hours,hour].sort();
    setLocalSched({...localSched,[date]:{...day,hours}});
  }
  function saveDay(date){
    const newSched = {...schedule,...localSched};
    saveSchedule(newSched);
    showToast(`${fmt(date)} — נשמר !`);
  }
  function copyToAll(){
    // copy first open day to all week
    const firstOpen = week.find(d=>localSched[d]?.open);
    if(!firstOpen){ showToast("אין יום פתוח להעתקה"); return; }
    const ref = localSched[firstOpen];
    const updated = {...localSched};
    week.forEach(d=>{ if(d!==firstOpen) updated[d]={...ref}; });
    setLocalSched(updated);
    saveSchedule({...schedule,...updated});
    showToast("השעות הועתקו לכל השבוע !");
  }

  return (
    <div>
      <div className="adm-hd" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"1rem"}}>
        <div><h2>🗓 ניהול זמינות</h2><p>הגדירי את שעות העבודה שלך יום-יום</p></div>
        <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
          <button className="btn btn-s" style={{fontSize:".8rem",padding:"8px 14px"}} onClick={()=>setWo(w=>Math.max(0,w-1))}>← שבוע קודם</button>
          <span style={{fontSize:".84rem",color:"#9a8585"}}>{fmt(week[0])} — {fmt(week[5])}</span>
          <button className="btn btn-s" style={{fontSize:".8rem",padding:"8px 14px"}} onClick={()=>setWo(w=>w+1)}>שבוע הבא →</button>
        </div>
      </div>
      <button className="btn btn-p" style={{marginBottom:"1.2rem",fontSize:".82rem"}} onClick={copyToAll}>📋 העתק יום ראשון לכל השבוע</button>
      {week.map((date,i)=>{
        const day = localSched[date] || {open:false, hours:[]};
        const isPast = new Date(date) < new Date();
        return (
          <div key={date} className="avail-day" style={{opacity:isPast?.6:1}}>
            <div className="avail-day-hd">
              <div>
                <div className="avail-day-name">{DAY_NAMES[i+1]}</div>
                <div className="avail-day-date">{fmt(date)}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <span className={`avail-status ${day.open?"avail-open":"avail-closed"}`}>{day.open?"פתוח":"סגור"}</span>
                <label className="toggle">
                  <input type="checkbox" checked={!!day.open} disabled={isPast} onChange={e=>toggleDay(date,e.target.checked)}/>
                  <span className="toggle-slider"></span>
                </label>
              </div>
            </div>
            {day.open && !isPast && (
              <>
                <p style={{fontSize:".78rem",color:"#9a8585",marginBottom:".6rem"}}>בחרי את השעות הפתוחות:</p>
                <div className="hours-select">
                  {ALL_HOURS.map(h=>(
                    <button key={h} className={`h-chip ${(day.hours||[]).includes(h)?"on":""}`} onClick={()=>toggleHour(date,h)}>{h}</button>
                  ))}
                </div>
                <div style={{marginTop:"1rem",display:"flex",justifyContent:"flex-start"}}>
                  <button className="btn btn-p" style={{fontSize:".82rem",padding:"8px 18px"}} onClick={()=>saveDay(date)}>💾 שמור יום זה</button>
                </div>
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── הגדרות ───────────────────────────────────────────────────────────────────
function SettingsPanel({ config, services, saveConfig, saveServices, showToast }) {
  const [tab, setTab]           = useState("salon");
  const [draft, setDraft]       = useState({...config});
  const [svcDraft, setSvcDraft] = useState(services.map(s=>({...s})));
  const [newPwd, setNewPwd]     = useState("");
  const [confirmPwd, setConfirmPwd] = useState("");

  function saveGeneral(){ saveConfig({...draft}); }
  function saveSvcs(){ saveServices(svcDraft.map(s=>({...s}))); }
  function updateSvc(id,field,val){ setSvcDraft(l=>l.map(s=>s.id===id?{...s,[field]:field==="price"||field==="duration"?Number(val):val}:s)); }
  function deleteSvc(id){ setSvcDraft(l=>l.filter(s=>s.id!==id)); }
  function addSvc(){ setSvcDraft(l=>[...l,{id:`custom-${nextSvcId++}`,label:"טיפול חדש",category:"ציפורניים",duration:30,price:80,icon:"💆",active:true}]); }
  function changePwd(){
    if(!newPwd) return showToast("הכניסי סיסמה חדשה");
    if(newPwd!==confirmPwd) return showToast("הסיסמאות אינן תואמות !");
    saveConfig({...draft,adminPassword:newPwd});
    setNewPwd(""); setConfirmPwd("");
  }

  return (
    <div>
      <div className="adm-hd"><h2>הגדרות ⚙️</h2></div>
      <div className="settings-tabs">
        {[{id:"salon",l:"🏪 סלון"},{id:"visuel",l:"🎨 עיצוב"},{id:"prestations",l:"💅 טיפולים"},{id:"messages",l:"📱 הודעות"},{id:"securite",l:"🔒 אבטחה"}].map(t=>(
          <button key={t.id} className={`stab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>

      {tab==="salon" && (
        <div className="settings-section">
          <h4>🏪 פרטי הסלון</h4>
          <div className="fg"><label className="fl">שם הסלון</label><input className="fi" value={draft.salonName} onChange={e=>setDraft(d=>({...d,salonName:e.target.value}))}/></div>
          <div className="fg"><label className="fl">סלוגן</label><input className="fi" value={draft.salonSlogan} onChange={e=>setDraft(d=>({...d,salonSlogan:e.target.value}))}/></div>
          <div className="fg"><label className="fl">תיאור</label><textarea className="fi" value={draft.salonDesc} onChange={e=>setDraft(d=>({...d,salonDesc:e.target.value}))}/></div>
          <button className="btn btn-p" onClick={saveGeneral}>💾 שמור</button>
        </div>
      )}

      {tab==="visuel" && (
        <div className="settings-section">
          <h4>🎨 צבע ראשי</h4>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"1rem",flexDirection:"row-reverse"}}>
            <div style={{width:40,height:40,borderRadius:10,border:"2px solid #fdf0f2",overflow:"hidden",flexShrink:0}}>
              <input type="color" value={draft.accentColor} style={{width:"100%",height:"100%",border:"none",cursor:"pointer",padding:0}} onChange={e=>setDraft(d=>({...d,accentColor:e.target.value,accentLight:e.target.value+"22"}))}/>
            </div>
            <span style={{fontWeight:600}}>{draft.accentColor}</span>
          </div>
          <div className="fl">צבעים מוכנים</div>
          <div className="color-presets">
            {COLOR_PRESETS.map(c=>(
              <div key={c} className={`color-preset ${draft.accentColor===c?"sel":""}`} style={{background:c}}
                onClick={()=>setDraft(d=>({...d,accentColor:c,accentLight:c+"22"}))}/>
            ))}
          </div>
          <div style={{marginTop:"1.2rem"}}><button className="btn btn-p" style={{background:draft.accentColor}} onClick={saveGeneral}>💾 החל</button></div>
        </div>
      )}

      {tab==="prestations" && (
        <div className="settings-section">
          <h4>💅 ניהול טיפולים</h4>
          <div className="svc-editor-row svc-editor-header">
            <span>אייקון</span><span>שם</span><span>קטגוריה</span><span>דקות</span><span>₪</span><span>פעיל</span><span></span>
          </div>
          {svcDraft.map(s=>(
            <div key={s.id} className="svc-editor-row">
              <select className="mini-input" value={s.icon} style={{padding:"4px",fontSize:"1rem"}} onChange={e=>updateSvc(s.id,"icon",e.target.value)}>
                {ICONS.map(ic=><option key={ic} value={ic}>{ic}</option>)}
              </select>
              <input className="mini-input" value={s.label} onChange={e=>updateSvc(s.id,"label",e.target.value)}/>
              <select className="mini-input" value={s.category} onChange={e=>updateSvc(s.id,"category",e.target.value)}>
                <option>ציפורניים</option><option>הסרת שיער</option><option>טיפולי פנים</option><option>אחר</option>
              </select>
              <input className="mini-input" type="number" min="5" step="5" value={s.duration} onChange={e=>updateSvc(s.id,"duration",e.target.value)}/>
              <input className="mini-input" type="number" min="1" value={s.price} onChange={e=>updateSvc(s.id,"price",e.target.value)}/>
              <label className="toggle">
                <input type="checkbox" checked={s.active} onChange={e=>updateSvc(s.id,"active",e.target.checked)}/>
                <span className="toggle-slider"></span>
              </label>
              <button className="del-btn" onClick={()=>deleteSvc(s.id)}>✕</button>
            </div>
          ))}
          <button className="add-svc-btn" onClick={addSvc}>+ הוסף טיפול</button>
          <div style={{marginTop:"1rem"}}><button className="btn btn-p" onClick={saveSvcs}>💾 שמור טיפולים</button></div>
        </div>
      )}

      {tab==="messages" && (
        <div className="settings-section">
          <h4>📱 הודעת אישור</h4>
          <p style={{fontSize:".8rem",color:"#9a8585",marginBottom:"1rem"}}>לחצי על משתנה להוספתו:</p>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"1rem"}}>
            {["{prenom}","{nom}","{salon}","{date}","{heure}","{prestation}","{duree}","{prix}"].map(v=>(
              <span key={v} style={{background:draft.accentLight,color:draft.accentColor,borderRadius:"6px",padding:"3px 8px",fontSize:".75rem",fontWeight:700,fontFamily:"monospace",cursor:"pointer",direction:"ltr"}}
                onClick={()=>setDraft(d=>({...d,confirmTemplate:d.confirmTemplate+v}))}>{v}</span>
            ))}
          </div>
          <div className="fg"><textarea className="fi" style={{minHeight:"160px",fontFamily:"monospace",fontSize:".85rem"}} value={draft.confirmTemplate} onChange={e=>setDraft(d=>({...d,confirmTemplate:e.target.value}))}/></div>
          <div style={{background:draft.accentLight,borderRadius:10,padding:"1rem",fontSize:".82rem",lineHeight:1.8,whiteSpace:"pre-line",marginBottom:"1rem",borderRight:`4px solid ${draft.accentColor}`}}>
            {draft.confirmTemplate.replace(/{prenom}/g,"שירה").replace(/{nom}/g,"שירה כהן").replace(/{salon}/g,draft.salonName).replace(/{date}/g,"12/03/2026").replace(/{heure}/g,"14:30").replace(/{prestation}/g,"ג'ל מניקור").replace(/{duree}/g,"90").replace(/{prix}/g,"180")}
          </div>
          <button className="btn btn-p" onClick={saveGeneral}>💾 שמור</button>
        </div>
      )}

      {tab==="securite" && (
        <div className="settings-section">
          <h4>🔒 שינוי סיסמה</h4>
          <p style={{fontSize:".8rem",color:"#9a8585",marginBottom:"1rem"}}>סיסמה נוכחית: <strong>{config.adminPassword}</strong></p>
          <div className="fg"><label className="fl">סיסמה חדשה</label><input className="fi" type="password" placeholder="••••••••" value={newPwd} onChange={e=>setNewPwd(e.target.value)}/></div>
          <div className="fg"><label className="fl">אישור</label><input className="fi" type="password" placeholder="••••••••" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)}/></div>
          {newPwd&&confirmPwd&&newPwd!==confirmPwd&&<div style={{color:"#b92b27",fontSize:".8rem",marginBottom:"1rem"}}>⚠ הסיסמאות אינן תואמות</div>}
          <button className="btn btn-p" onClick={changePwd}>🔑 עדכן סיסמה</button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
